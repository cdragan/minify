name: Tests

on:
  push:
    branches:
      - main

jobs:
  unix:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Test
        run: ./runtests

  windows:
    runs-on: windows-2022
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86
          - x64
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          path-type: inherit
      - name: Remove link.exe from MSYS2
        shell: msys2 {0}
        run: rm -f /bin/link.exe
      - uses: actions/checkout@v6
      - name: Test
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.arch }}
          msys2 -c "ARCH=${{ matrix.arch }} ./runtests"
      - name: Debug packed crash
        if: always()
        shell: cmd
        run: |
          set "EXE=Out\release\pe_run_test\mini.pe_test.exe"
          if not exist "%EXE%" set "EXE=Out\debug\pe_run_test\mini.pe_test.exe"
          if not exist "%EXE%" (echo No packed exe found & exit /b 0)
          set "CDB=C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe"
          if not exist "%CDB%" for /f "delims=" %%i in ('where /R "C:\Program Files (x86)\Windows Kits" cdb.exe 2^>nul') do set "CDB=%%i"
          if not exist "%CDB%" (echo cdb.exe not found & exit /b 0)
          echo Debugging "%EXE%" with "%CDB%"
          "%CDB%" -G -c "g; .lastevent; r; lm; kb; q" "%EXE%"
          exit /b 0
